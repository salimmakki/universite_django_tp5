{% extends 'cours/base.html' %}
{% block titre %}{{ action }} un enseignant{% endblock %}

{% block contenu %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header bg-success text-white">
        <h5 class="mb-0">
          <i class="bi bi-person-badge me-2"></i>{{ action }} un enseignant
        </h5>
      </div>
      <div class="card-body p-4">
        <form method="POST">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label for="{{ field.id_for_label }}" class="form-label fw-semibold">
              {{ field.label }}
            </label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors }}</div>
            {% endif %}
          </div>
          {% endfor %}
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-check-circle me-1"></i>{{ action }}
            </button>
            <a href="{% url 'liste_enseignants' %}" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-1"></i>Annuler
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
