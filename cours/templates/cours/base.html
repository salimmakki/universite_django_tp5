<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Université - {% block titre %}Accueil{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: bold; letter-spacing: 1px; }
    .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .table thead { background-color: #0d6efd; color: white; }
    .btn-action { width: 36px; height: 36px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'accueil' %}">
        <i class="bi bi-mortarboard-fill me-2"></i>Université
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          {% if user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link" href="{% url 'liste_cours' %}">
              <i class="bi bi-book me-1"></i>Cours
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'liste_enseignants' %}">
              <i class="bi bi-person-badge me-1"></i>Enseignants
            </a>
          </li>
          <li class="nav-item ms-lg-3">
            <span class="navbar-text text-white-50 me-2">
              <i class="bi bi-person-circle me-1"></i>{{ user.username }}
            </span>
          </li>
          <li class="nav-item">
            <a class="btn btn-outline-light btn-sm" href="{% url 'deconnexion' %}">
              <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
            </a>
          </li>
          {% else %}
          <li class="nav-item">
            <a class="btn btn-outline-light btn-sm" href="{% url 'connexion' %}">
              <i class="bi bi-box-arrow-in-right me-1"></i>Se connecter
            </a>
          </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    {% block contenu %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
