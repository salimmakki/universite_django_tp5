{% extends 'cours/base.html' %}
{% block titre %}Connexion{% endblock %}

{% block contenu %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">

    <div class="text-center mb-4">
      <i class="bi bi-mortarboard-fill display-3 text-primary"></i>
      <h2 class="mt-2 fw-bold">Université</h2>
      <p class="text-muted">Connectez-vous pour accéder à l'application</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <h5 class="card-title mb-4 fw-bold">
          <i class="bi bi-box-arrow-in-right me-2 text-primary"></i>Connexion
        </h5>

        {% if message %}
        <div class="alert alert-danger d-flex align-items-center" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          {{ message }}
        </div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Nom d'utilisateur</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" placeholder="Votre identifiant" autofocus required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Mot de passe</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Votre mot de passe" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
          </button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
